x-worker-defaults: &worker-defaults
  build:
    context: .
    dockerfile: docker/worker.Dockerfile
    network: host
  env_file:
    - .env
  working_dir: /app
  restart: unless-stopped
  depends_on:
    kafka:
      condition: service_healthy
    postgres:
      condition: service_healthy
    qdrant:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Mode"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pipeline-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - pipeline-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - pipeline-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pipeline
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pipeline}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d pipeline"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pipeline-net

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':18BD' /proc/net/tcp /proc/net/tcp6"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pipeline-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pipeline-net

  connector-runner:
    <<: *worker-defaults
    command: python -m scripts.run_connectors
    expose:
      - "9091"
    environment:
      METRICS_PORT: 9091
    networks:
      - pipeline-net

  normalizer:
    <<: *worker-defaults
    command: python -m workers.normalizer worker -l info
    environment:
      METRICS_PORT: 9090
    ports:
      - "9090:9090"
    networks:
      - pipeline-net

  vectorizer:
    <<: *worker-defaults
    command: python -m workers.vectorizer
    expose:
      - "9092"
    environment:
      METRICS_PORT: 9092
    networks:
      - pipeline-net

  api:
    <<: *worker-defaults
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pipeline-net

  dashboard:
    build:
      context: ./frontend
      network: host
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    networks:
      - pipeline-net

  prometheus:
    image: prom/prometheus:v2.50.0
    user: "65534:65534"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9093:9090"
    depends_on:
      normalizer:
        condition: service_started
      vectorizer:
        condition: service_started
      api:
        condition: service_started
      connector-runner:
        condition: service_started
    networks:
      - pipeline-net

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - pipeline-net

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  grafana_data:

networks:
  pipeline-net:
    driver: bridge
