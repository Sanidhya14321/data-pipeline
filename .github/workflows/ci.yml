name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit detect-secrets

      - name: Bandit scan
        run: bandit -r .

      - name: detect-secrets scan
        run: detect-secrets scan --all-files

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: security
    env:
      KAFKA_BROKERS: localhost:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      KAFKA_SASL_MECHANISM: PLAIN
      KAFKA_USERNAME: test
      KAFKA_PASSWORD: test
      KAFKA_TOPIC_RAW_EVENTS: raw.events
      KAFKA_TOPIC_NORMALIZED_EVENTS: normalized.events
      KAFKA_TOPIC_EMBEDDING_JOBS: embedding.jobs
      KAFKA_TOPIC_DLQ: dead.letter.queue
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      POSTGRES_POOL_MIN_SIZE: "1"
      POSTGRES_POOL_MAX_SIZE: "2"
      QDRANT_URL: http://localhost:6333
      QDRANT_API_KEY: test-key
      QDRANT_COLLECTION: pipeline_docs
      REDIS_URL: redis://localhost:6379/0
      REDIS_DB: "0"
      GROQ_API_KEY: test-key
      GROQ_CLASSIFY_MODEL: llama-3.1-8b-instant
      GROQ_EXTRACT_MODEL: llama-3.3-70b-versatile
      LLM_REQUEST_TIMEOUT_SECONDS: "30"
      NEWS_API_KEY: test-key
      GITHUB_TOKEN: test-token
      SEC_USER_AGENT: TestCompany contact@test.com
      GITHUB_API_BASE_URL: https://api.github.com
      COMPOSIO_API_KEY: test-key
      COMPOSIO_WEBHOOK_SECRET: test-key
      PIPELINE_API_KEY: test-key
      LOG_LEVEL: INFO
      ENVIRONMENT: test
      APP_HOST: 0.0.0.0
      APP_PORT: "8080"
      METRICS_PORT: "9090"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit -v --cov --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/worker.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
