name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  deploy-staging:
    name: Deploy Staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set kubectl context (staging)
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" > ~/.kube/config

      - name: Update images
        run: |
          kubectl -n pipeline set image deployment/normalizer normalizer=ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          kubectl -n pipeline set image deployment/vectorizer vectorizer=ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          kubectl -n pipeline set image deployment/pipeline-api api=ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

      - name: Wait for rollouts
        run: |
          kubectl -n pipeline rollout status deployment/normalizer --timeout=120s
          kubectl -n pipeline rollout status deployment/vectorizer --timeout=120s
          kubectl -n pipeline rollout status deployment/pipeline-api --timeout=120s

      - name: Smoke test
        run: curl -fsS "${{ secrets.STAGING_API_BASE_URL }}/api/v1/ready"

      - name: Slack notify success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"Staging deploy succeeded for '${{ github.sha }}'"}' \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

  deploy-production:
    name: Deploy Production
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set kubectl context (production)
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" > ~/.kube/config

      - name: Update images
        run: |
          kubectl -n pipeline set image deployment/normalizer normalizer=ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          kubectl -n pipeline set image deployment/vectorizer vectorizer=ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          kubectl -n pipeline set image deployment/pipeline-api api=ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Wait for rollouts
        run: |
          kubectl -n pipeline rollout status deployment/normalizer --timeout=120s
          kubectl -n pipeline rollout status deployment/vectorizer --timeout=120s
          kubectl -n pipeline rollout status deployment/pipeline-api --timeout=120s

      - name: Smoke test
        run: curl -fsS "${{ secrets.PRODUCTION_API_BASE_URL }}/api/v1/ready"

      - name: Slack notify release
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"Production deploy succeeded for '${{ github.ref_name }}'"}' \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
