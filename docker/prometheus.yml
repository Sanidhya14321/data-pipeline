global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: normalizer
    static_configs:
      - targets: ["normalizer:9090"]

  - job_name: vectorizer
    static_configs:
      - targets: ["vectorizer:9092"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: connector-runner
    static_configs:
      - targets: ["connector-runner:9091"]
