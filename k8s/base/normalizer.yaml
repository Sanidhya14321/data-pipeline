apiVersion: apps/v1
kind: Deployment
metadata:
  name: normalizer
  namespace: pipeline
  labels:
    app: normalizer
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: normalizer
  template:
    metadata:
      labels:
        app: normalizer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "9090"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: normalizer
          image: ghcr.io/your-org/data-pipeline-worker:latest
          command: ["python", "-m", "workers.normalizer", "worker", "-l", "info"]
          ports:
            - containerPort: 9090
              name: metrics
          envFrom:
            - secretRef:
                name: pipeline-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1.5Gi
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: normalizer
  namespace: pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: normalizer
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: normalizer
  namespace: pipeline
  labels:
    app: normalizer
spec:
  type: ClusterIP
  selector:
    app: normalizer
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
